name: 🐛 Tool bug report
description: Report a bug or unexpected behavior in the Simple Dune Server Management Tool itself (the desktop app, the PowerShell script, or the .bat launcher).
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## What this tracker is for

        This issue tracker is for **bugs in this tool's code** — the
        desktop app, the PowerShell script, the `.bat` launcher,
        and the setup wizard.

        **Please do _not_ open issues here for:**
        - VM connectivity / SSH / network / port-forwarding problems
        - Hyper-V configuration or performance tuning
        - Funcom dedicated-server bugs (game crashes, missing pods,
          `battlegroup` CLI errors that aren't caused by this tool)
        - General "how do I play / host" questions

        For those, ping `@allcoast` on Discord or check the
        [Funcom Self-Hosted Server docs](https://duneawakening.com/self-hosted-servers/).

        ---

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Please confirm this is actually a bug in the tool's code.
      options:
        - label: This is a bug in the tool itself (app crashes, menu option misbehaves, terminal pane broken, setup wizard fails, etc.) — **not** a VM/network/Funcom-server issue.
          required: true

  - type: input
    id: tool_version
    attributes:
      label: Tool version
      description: Shown in the menu header / app footer (e.g. `v5.0.0`). Auto-filled when launched from `Report Issue` in the desktop app or CLI.
      placeholder: "v5.0.0"
    validations:
      required: true

  - type: input
    id: menu_option
    attributes:
      label: Menu option / command
      description: Which menu letter/number or `-Cmd <name>` triggered the bug?
      placeholder: "e.g. e. reboot, or -Cmd startup, or 'SSH' button in the app"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: Paste the actual error message or unexpected output from the terminal pane. Screenshots also welcome.
      placeholder: |
        e.g. "After clicking 'SSH' the terminal pane went blank and
        the footer said 'Terminal not ready after 8s'."
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: transcript
    attributes:
      label: Transcript / log excerpt
      description: |
        Every CLI run is auto-logged to `.logs\dune-server-<timestamp>.log`
        next to `dune-server.bat`. Paste the relevant section (last 30-50
        lines around the failure is usually enough — please **redact**
        public IPs, SSH key paths, and any secrets first).
      render: shell

  - type: textarea
    id: diagnostics
    attributes:
      label: Auto-collected diagnostics
      description: |
        Auto-filled by the `Report Issue` button / `report-issue` command. Includes:
        environment (Windows + PowerShell + WebView2 runtime version), app paths,
        and the tail of `%APPDATA%\DuneServer\webview2-debug.log` if present.
        Leave as-is unless you want to redact something.
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      description: Windows version + PowerShell version (`$PSVersionTable.PSVersion`). Auto-filled.
      placeholder: "Windows 11 23H2, PowerShell 7.4.1"
