name: 🐛 Tool bug report
description: Report a bug or unexpected behavior in the Dune Server Tool itself (the desktop app, the PowerShell script, the .bat launcher, or the installer).
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## What this tracker is for

        This issue tracker is for **bugs in this tool's code** — the desktop
        app (Server Health, Commands, PowerShell, Game Config, Gameplay Admin,
        DD Map, Database, Sietches, Map SpinUp, Settings, Tailscale, Setup
        Wizard), the PowerShell script (`dune-server.ps1`), the `.bat`
        launcher, and the installer (`DuneServerSetup.exe`).

        > 💡 **One-click report from the app.** In the desktop app, click
        > **Help → Create GitHub Issue + Save Logs**. It opens this form
        > pre-filled AND saves `dst-diagnostics-<timestamp>.zip` to your
        > Desktop (Explorer pops with the ZIP selected). **Drag the ZIP
        > into the comment area below** to attach all logs at once — VM IPs,
        > SSH paths, Windows usernames, and config secrets are redacted before
        > the ZIP is written. The bundle includes a redacted **UserGame.ini /
        > UserEngine.ini snapshot** (with an automatic duplicate-section-header
        > check) when the VM is reachable, and its `manifest.txt` lists what's
        > inside and any sanitization warnings.

        **✅ Do open an issue here** when the tool shows you a problem, e.g.:
        - The **Server Health** page shows the battlegroup as **Unknown** with
          a yellow message under it (SSH key / connection diagnostics).
        - The **Setup Wizard / preflight** "SSH key authorized on VM" check
          fails, or any other preflight check is wrong.
        - **Game Config**, **Database** (backup / restore / SQL editor /
          backup schedule), **Map SpinUp**, **Characters**, a button, page, the
          top menu bar, or the embedded PowerShell pane misbehaves.

        > 💡 The tool explains *why* it can't reach the VM. If you see one of
        > those yellow messages, copy it into the **Connection / VM status
        > message** box below — that's usually all we need to pinpoint it.

        **Please do _not_ open issues here for:**
        - Raw network / router / port-forwarding setup where the **tool itself
          shows no message** (ping `@allcoast` on Discord instead).
        - Hyper-V configuration or performance tuning.
        - Funcom dedicated-server bugs (game crashes, missing pods,
          `battlegroup` CLI errors that aren't caused by this tool).
        - General "how do I play / host" questions.

        For those, ping `@allcoast` on Discord or check the
        [Funcom Self-Hosted Server docs](https://duneawakening.com/self-hosted-servers/).

        ---

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Please confirm this is about the tool, not a raw Funcom/network problem.
      options:
        - label: This is about the tool — the app/CLI itself misbehaves, **or** the tool shows me an error/diagnostic message (e.g. the Server Health battlegroup status, a Setup "SSH key" check). It is **not** a pure Funcom game-server crash or router/port-forwarding question with no tool message.
          required: true

  - type: input
    id: tool_version
    attributes:
      label: Tool version
      description: Shown in the bottom-left of the web portal sidebar (status bar) and in the CLI menu header. Auto-filled when launched from **Help → Create GitHub Issue** in the top menu bar, or from the CLI `report-issue` command.
      placeholder: "v12.5.5"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where did the bug happen?
      description: Which part of the tool was affected? Pick the closest match. (Nav groups are Server Health, PowerShell, Game Data, Database, System, plus a Help dropdown on the right.)
      options:
        - Web portal — Server Health (Dashboard)
        - Web portal — Battlegroup shows "Unknown" / tool can't connect to the VM (SSH)
        - Web portal — Commands
        - Web portal — PowerShell (embedded xterm.js terminal)
        - Web portal — Game Config — VM INI (UserGame.ini / UserEngine.ini / Spicefield Types)
        - Web portal — Game Config — client-side INI (preview / Open in Notepad / client-apply reminder)
        - Web portal — Gameplay Admin — Overview
        - Web portal — Gameplay Admin — Market / Market Bot
        - Web portal — Gameplay Admin — Players
        - Web portal — Gameplay Admin — Players — Give Item / Give Package / Give Vehicle Kit (incl. "Allow overflow")
        - Web portal — Gameplay Admin — Players — Cheat Scripts / Dev-Perf Scripts (Live)
        - Web portal — Gameplay Admin — Players — Journey (node browser / complete / reset / wipe)
        - Web portal — Gameplay Admin — Players — Unlock Trainers (skill-tree ownership status) / Unlock Main Quest (Progression)
        - Web portal — Gameplay Admin — Players — Landsraad (contribution editor)
        - Web portal — Gameplay Admin — Bases
        - Web portal — Gameplay Admin — Storage
        - Web portal — Gameplay Admin — Blueprints (incl. Blueprint Designer link)
        - Web portal — DD Map
        - Web portal — Database (Backup / Restore / SQL Editor)
        - Web portal — Database (Backup Schedule / crontab)
        - Web portal — Sietches (Additional Survival_1 shards)
        - Web portal — Map SpinUp (incl. Restart Hagga / Restart Deep Desert)
        - Web portal — Settings (general — paths, ports, providers)
        - Web portal — Settings (Dune Server Tool self-updater)
        - Web portal — Tailscale (remote-access / device list)
        - Web portal — Setup Wizard / first-run
        - Web portal — Top menu bar / Help dropdown
        - Web portal — Sidebar / status bar / window chrome
        - Desktop app shell (DuneShell.exe / WebView2) / PWA install
        - CLI (`dune-server.ps1` / `dune-server.bat`)
        - Installer (`DuneServerSetup.exe`) / first-run setup
        - Update checker / auto-updater (DST)
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: menu_option
    attributes:
      label: Specific page / button / command
      description: Which button, tab, menu letter/number, or `-Cmd <name>` triggered the bug?
      placeholder: "e.g. Server Health 'Restart battlegroup' button, Game Config > Spicefields > Save, Game Config > Landsraad > Save, Game Config > client INI 'Fix my client config', Gameplay Admin > Market Bot > toggle, Gameplay Admin > Market Bot > Pricing rules > Market-follow pricing toggle, Gameplay Admin > Market Bot > Pricing rules > Market markup %, Gameplay Admin > Market Bot > Buy side > Over-market guard, Gameplay Admin > Players > Give Item (Allow overflow), Gameplay Admin > Players > Give Vehicle Kit > Sandbike (Allow overflow), Gameplay Admin > Players > inventory item > Stack quantity, Gameplay Admin > Storage > container item > Stack quantity, Gameplay Admin > Players > Cheat Scripts > Award Player XP, Gameplay Admin > Players > Journey > Complete node, Gameplay Admin > Players > Actions > Unlock Trainers > Swordmaster, Gameplay Admin > Players > Actions > Unlock Main Quest > A New Beginning, Gameplay Admin > Players > Landsraad > set House Ecaz, Gameplay Admin > Players > Actions > Punishment > Ban, Gameplay Admin > Players > Hide GM toggle, Tailscale > 'Admin console', Database > Backup Schedule presets > Hourly, Map SpinUp > Survival_2, Map SpinUp > Arrakeen loading counter, Map SpinUp > Restart Hagga, Help > Create GitHub Issue, CLI option 'e. reboot', or -Cmd startup"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: Paste the actual error message or unexpected output from the terminal pane / status bar. Screenshots also welcome.
      placeholder: |
        e.g. "After clicking 'Save' on the Players > Inventory tab,
        the status text went red and said 'psql exec failed' but the
        terminal pane was empty."
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: gameconfig_diag
    attributes:
      label: Game Config — setting that didn't apply (only for Game Config / INI bugs)
      description: |
        For "I changed a setting but it had no effect in-game", or values that
        seem ignored / duplicated (e.g. base expansion, player inventory
        capacity, XP / Fame). The diagnostic ZIP now bundles a redacted
        **UserGame.ini / UserEngine.ini snapshot** headlined with a
        duplicate-section-header check — attaching it (see below) is the single
        most useful thing for these bugs. Also tell us:

        - Which exact setting(s) you changed, and to what value.
        - What DST shows for that value after a reload vs what you see in-game.
        - Whether you **restarted the server zone** after saving (server INI
          changes only take effect after a zone restart).

        Leave blank if your bug isn't about Game Config.
      placeholder: |
        Changed: Base > Max Building Extensions 5 -> 8; Player Inventory Volume 185 -> 195
        DST shows 195 after reload; in-game still behaves like 185.
        Zone restarted after save? yes
      render: shell
    validations:
      required: false

  - type: textarea
    id: giveitem_diag
    attributes:
      label: Give Item / Give Vehicle Kit — item or part that didn't appear (Give Item, Give Package, or a vehicle kit)
      description: |
        For items or vehicle parts that show in DST's listing/preview but don't
        appear in-game (player inventory or a storage container).

        **Give Item / Give Package** — tell us:

        - The exact item — its **name AND the template id** shown in the picker
          (e.g. `Copper Ingot — CopperBar`). If you only see a number, paste it.
        - Destination: player inventory, or a storage container (and its type).
        - Quantity / quality, and whether it's a stackable resource or equipment.
        - Did it show in DST's listing? Did it show in-game **after a server zone
          restart** / relog?

        **Give Vehicle Kit** — tell us:

        - Which **vehicle** you picked (Sandbike, Buggy, Sandcrawler, Scout /
          Assault / Carrier Ornithopter).
        - Which **part(s)** were missing or wrong, and the **quantity** the
          preview showed vs what landed (e.g. *preview said Tread ×3, only 1
          arrived*).
        - Whether **"Allow overflow (drop to ground)"** was ticked, and whether
          the player was **online or offline** (overflow only applies online).
        - Did the parts show in the form's preview? Did they appear in-game after
          a relog / zone restart?

        Leave blank if your bug isn't about giving items or vehicle kits.
      placeholder: |
        Item/kit: Give Vehicle Kit > Sandbike
        Missing/wrong: preview showed Tread Mk6 ×3, only 1 Tread arrived
        Allow overflow: on. Player online: yes
        Showed in preview: yes. Showed in-game after relog: partial
      render: shell
    validations:
      required: false

  - type: textarea
    id: cheatscripts_diag
    attributes:
      label: Cheat Scripts / Dev-Perf Scripts — script had no effect (Players → Live)
      description: |
        For the Players → Live **Cheat Scripts** and **Dev / Perf Scripts** rows.
        Note that these scripts originate from the Playtest server and **may
        legitimately do nothing on a retail server** — tell us so we can tell a
        real bug apart from an expected no-op:

        - Which **button** (e.g. Playtest Setup, Award Player XP, Unlock All
          Skills / Abilities, Leave Me Alone, Start/Stop Hitch Test) **or the
          freeform script name** you typed.
        - Was the target player **online**? (Live-only — the buttons are disabled
          while the player is offline.)
        - What DST's status line said after firing, and what you expected vs saw
          in-game.

        Leave blank if your bug isn't about the cheat / dev-perf script buttons.
      placeholder: |
        Button / script: Award Player XP
        Player online: yes
        DST said: "script dispatched"; in-game XP did not change
      render: shell
    validations:
      required: false

  - type: textarea
    id: landsraad_diag
    attributes:
      label: Landsraad — contribution editor or settings-struct / client-block warning
      description: |
        For Players → **Landsraad** (setting a player's House contribution) **or**
        Game Config Landsraad settings (the nested `LandsraadSettings Data=(...)`
        struct). The diagnostic ZIP's redacted **UserGame.ini snapshot** captures
        this struct — attaching it (see below) is the single most useful thing for
        these bugs. Also tell us:

        - **Contribution editor:** which House and amount you set, what DST showed
          after reload, and what you saw in-game.
        - **Settings struct / client warning:** which Landsraad member(s) you
          edited; whether the **"your client is missing part of a settings block"**
          warning appeared (and what it listed); and whether **"Fix my client
          config"** resolved it or members went missing after a save.

        Leave blank if your bug isn't about Landsraad.
      placeholder: |
        Edited: Game Config > Landsraad > Voting Period Duration 600 -> 900
        Client warning appeared: yes — listed ~35 missing members
        After "Fix my client config": block restored / still missing?
      render: shell
    validations:
      required: false

  - type: textarea
    id: connection_diag
    attributes:
      label: Connection / VM status message (only if your bug involves the VM / SSH / battlegroup)
      description: |
        The tool now tells you **why** it can't reach the battlegroup — copy the
        exact message it shows. Where to find each piece (skip what doesn't apply):

        - **Dashboard → "Battlegroup + VM" card:** the yellow line under the
          status (e.g. *"SSH key is passphrase-protected…"*, *"VM rejected the
          SSH key…"*, *"Battlegroup not started…"*, *"VM is not answering SSH
          yet…"*). Also shown under **Battlegroup info**.
        - **Setup Wizard / Settings → "Re-run checks":** paste the detail text
          from the **"SSH key authorized on VM"** row.
        - **Settings → SSH Key field:** the path to the key the tool is using.

        Leave blank if your bug has nothing to do with the VM/SSH.
      placeholder: |
        Dashboard message: "SSH key is passphrase-protected, so background checks can't use it…"
        Setup "SSH key authorized on VM": "The VM rejected this key…"
        SSH Key path (Settings): C:\Users\me\.ssh\dune_key
      render: shell
    validations:
      required: false

  - type: dropdown
    id: ssh_interactive
    attributes:
      label: Does an interactive SSH terminal still work?
      description: |
        Only relevant for VM/SSH bugs. Open **Commands → "Open an SSH terminal to
        the VM"** (or the **PowerShell** page and run the SSH command yourself).
        This single answer tells us apart a passphrase-protected key (works here,
        fails the dashboard) from a key the VM never authorized (fails everywhere).
      options:
        - Not applicable — my bug isn't about VM/SSH connectivity
        - "Yes — the interactive SSH terminal connects, but the Dashboard still shows Unknown"
        - No — the interactive SSH terminal also fails
        - Haven't tried
    validations:
      required: false

  - type: textarea
    id: tailscale_diag
    attributes:
      label: Tailscale status (only if your bug is on the Tailscale page)
      description: |
        The Tailscale page wraps the local `tailscale` CLI (read-only). If the
        page is empty, stuck, or wrong, paste the output of the following from a
        terminal on the **machine running the tool** (redact public/100.x IPs and
        device names you'd rather not share):

        ```
        tailscale version
        tailscale status
        ```

        Also note what the page itself shows: "Tailscale isn't installed", the
        "Tailscale isn't connected (state: …)" card, or a populated device list
        with something wrong. Leave blank if your bug isn't about Tailscale.
      placeholder: |
        Page shows: "Tailscale isn't connected (state: NeedsLogin)"
        tailscale version: 1.xx.x
        tailscale status: <redacted>
      render: shell
    validations:
      required: false

  - type: textarea
    id: transcript
    attributes:
      label: Transcript / log excerpt
      description: |
        💡 **Easiest path: attach the diagnostic ZIP.** Use **Help → Create
        GitHub Issue + Save Logs** in the desktop app — it saves a redacted
        `dst-diagnostics-<timestamp>.zip` to your Desktop and reveals it in
        Explorer. Drag it onto this comment area to attach.

        If you'd rather paste manually, every CLI run is auto-logged to
        `.logs\dune-server-<timestamp>.log` next to `dune-server.bat`. The
        desktop app also writes `%APPDATA%\DuneServer\webview2-debug.log`.
        Paste the relevant section (last 30-50 lines around the failure is
        usually enough — please **redact** public IPs, SSH key paths,
        hostnames, and any secrets first).
      render: shell

  - type: textarea
    id: diagnostics
    attributes:
      label: Auto-collected diagnostics
      description: |
        Auto-filled by the `Report Issue` button / `report-issue` command. Includes:
        environment (Windows + PowerShell + WebView2 runtime version), app paths,
        and the tail of `%APPDATA%\DuneServer\webview2-debug.log` if present.
        Leave as-is unless you want to redact something.
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      description: Windows version + PowerShell version (`$PSVersionTable.PSVersion`). Auto-filled.
      placeholder: "Windows 11 23H2, PowerShell 7.4.1"
