name: 🐛 Tool bug report
description: Report a bug or unexpected behavior in the Simple Dune Server Management Tool itself (the desktop app, the PowerShell script, or the .bat launcher).
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## What this tracker is for

        This issue tracker is for **bugs in this tool's code** — the
        desktop app (Dashboard / Monitoring / Characters / Game Config /
            Database / DD Map / Settings / Setup Wizard / Additional Sietches),
        the PowerShell script (`dune-server.ps1`), the `.bat`
        launcher, and the installer.

        **Please do _not_ open issues here for:**
        - VM connectivity / SSH / network / port-forwarding problems
        - Hyper-V configuration or performance tuning
        - Funcom dedicated-server bugs (game crashes, missing pods,
          `battlegroup` CLI errors that aren't caused by this tool)
        - General "how do I play / host" questions

        For those, ping `@allcoast` on Discord or check the
        [Funcom Self-Hosted Server docs](https://duneawakening.com/self-hosted-servers/).

        ---

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Please confirm this is actually a bug in the tool's code.
      options:
        - label: This is a bug in the tool itself (app crashes, a page misrenders, a button does nothing, terminal pane broken, setup wizard fails, character/database/game-config edits don't save, etc.) — **not** a VM/network/Funcom-server issue.
          required: true

  - type: input
    id: tool_version
    attributes:
      label: Tool version
      description: Shown in the bottom-left of the web portal sidebar and in the CLI menu header. Auto-filled when launched from the **?** help button in the top-left of the portal, or from the CLI `report-issue` command.
      placeholder: "v6.1.22"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where did the bug happen?
      description: Which part of the tool was affected? Pick the closest match.
      options:
        - Web portal — Dashboard / Server Health
        - Web portal — Monitoring
        - Web portal — Commands
        - Web portal — PowerShell pane
        - Web portal — Characters
        - Web portal — Game Config
        - Web portal — Database (Backup / Restore / SQL Editor)
        - Web portal — DD Map
        - Web portal — Settings (general)
        - Web portal — Settings (dune-admin updater / sane-pricing auto-apply)
        - Web portal — Settings (Dune Server Tool self-updater)
        - Web portal — Setup Wizard / first-run
        - Web portal — Additional Sietches / Sietches
        - Web portal — Sidebar / status bar / window chrome / help button
        - PWA install / desktop-app shell
        - CLI (`dune-server.ps1` / `dune-server.bat`)
        - Installer / first-run setup
        - Update checker / auto-updater
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: menu_option
    attributes:
      label: Specific page / button / command
      description: Which button, tab, menu letter/number, or `-Cmd <name>` triggered the bug?
      placeholder: "e.g. Dashboard 'Restart' button, Characters > Cosmetics > Save, CLI option 'e. reboot', or -Cmd startup"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: Paste the actual error message or unexpected output from the terminal pane / status bar. Screenshots also welcome.
      placeholder: |
        e.g. "After clicking 'Save' on the Characters > Inventory tab,
        the status text went red and said 'psql exec failed' but the
        terminal pane was empty."
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: transcript
    attributes:
      label: Transcript / log excerpt
      description: |
        Every CLI run is auto-logged to `.logs\dune-server-<timestamp>.log`
        next to `dune-server.bat`. The desktop app also writes
        `%APPDATA%\DuneServer\webview2-debug.log`. Paste the relevant
        section (last 30-50 lines around the failure is usually enough
        — please **redact** public IPs, SSH key paths, hostnames, and
        any secrets first).
      render: shell

  - type: textarea
    id: diagnostics
    attributes:
      label: Auto-collected diagnostics
      description: |
        Auto-filled by the `Report Issue` button / `report-issue` command. Includes:
        environment (Windows + PowerShell + WebView2 runtime version), app paths,
        and the tail of `%APPDATA%\DuneServer\webview2-debug.log` if present.
        Leave as-is unless you want to redact something.
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      description: Windows version + PowerShell version (`$PSVersionTable.PSVersion`). Auto-filled.
      placeholder: "Windows 11 23H2, PowerShell 7.4.1"
