name: Deploy site to GitHub Pages

# Builds site/ with Astro and publishes it to GitHub Pages.
# Final URL: https://coastal-ms.github.io/DST-DuneServerTool/
#
# Triggers:
#   - push to main (only when files that affect the site change)
#   - any release publish (so the Download button picks up the new tag)
#   - manual run from the Actions tab

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "CHANGELOG.md"
      - "docs/img/**"
      - ".github/workflows/deploy-site.yml"
  # NOTE: we intentionally do NOT trigger on `release: published`. The
  # `release: v10.2.X ...` merge commit to main always touches CHANGELOG.md
  # and re-deploys the site, and the github-pages environment only allows
  # one concurrent deploy — so a release-event run that fires while the
  # CHANGELOG-push run is in flight just gets rejected and spams CI email.
  workflow_dispatch:

# Allow only one deploy at a time; cancel in-progress runs on new pushes.
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
