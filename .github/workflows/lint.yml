name: Lint PowerShell

on:
  push:
    branches: [main]
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '.github/workflows/lint.yml'

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Parse-validate dune-server.ps1
        shell: pwsh
        run: |
          $tokens = $null; $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              "$PWD\dune-server.ps1", [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                  "::error file=dune-server.ps1,line=$($_.Extent.StartLineNumber)::$($_.Message)"
              }
              exit 1
          }
          Write-Host "Parse OK"

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path .\dune-server.ps1 -Severity @('Error','Warning')
          if ($results) {
              $results | Format-Table -AutoSize
              $errs = $results | Where-Object Severity -eq 'Error'
              if ($errs) { exit 1 }
          } else {
              Write-Host "No issues found."
          }
