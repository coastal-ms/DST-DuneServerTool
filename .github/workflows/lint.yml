name: Lint PowerShell

# Triggered on:
#   - push to main: only when PowerShell files (or this workflow) change, to
#     keep CI minutes low on doc / site-only pushes.
#   - pull_request to main: ALWAYS, regardless of which files changed. This
#     workflow's job name (`lint`) is a required status check on main, and
#     filtering it by paths means PRs that don't touch *.ps1 would block
#     forever waiting for a check that never runs. The lint steps below are
#     a few seconds when there's nothing relevant to lint, so the cost is
#     negligible. See PR #58 history for the catch-22 this resolves.
on:
  push:
    branches: [main]
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Parse-validate dune-server.ps1
        shell: pwsh
        run: |
          $tokens = $null; $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              "$PWD\dune-server.ps1", [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                  "::error file=dune-server.ps1,line=$($_.Extent.StartLineNumber)::$($_.Message)"
              }
              exit 1
          }
          Write-Host "Parse OK"

      - name: Parse-validate helper/*.ps1
        shell: pwsh
        # Helper is an additive scaffold (`helper/bridge/`, `helper/friend/`)
        # and is not loaded by dune-server.ps1, so it isn't covered by the
        # main parse step. But these scripts ship to the host's PC (bridge) and
        # build the friend's .exe, so a parse regression here would silently
        # break the helper without anyone noticing. Cheap to guard.
        run: |
          $any = Get-ChildItem -Path .\helper -Recurse -Filter *.ps1 -ErrorAction SilentlyContinue
          if (-not $any) {
              Write-Host "::warning::no helper/*.ps1 files found; skipping."
              exit 0
          }
          $bad = 0
          foreach ($f in $any) {
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  $f.FullName, [ref]$null, [ref]$errors) | Out-Null
              if ($errors -and $errors.Count -gt 0) {
                  $rel = Resolve-Path -Relative $f.FullName
                  foreach ($e in $errors) {
                      Write-Host "::error file=$rel,line=$($e.Extent.StartLineNumber)::$($e.Message)"
                  }
                  $bad++
              } else {
                  Write-Host "  $($f.FullName) OK"
              }
          }
          if ($bad -gt 0) { exit 1 }
          Write-Host "All $($any.Count) helper script(s) parse OK"

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path .\dune-server.ps1 -Severity @('Error','Warning')
          if ($results) {
              $results | Format-Table -AutoSize
              $errs = $results | Where-Object Severity -eq 'Error'
              if ($errs) { exit 1 }
          } else {
              Write-Host "No issues found."
          }

      - name: Guard remote-portal isolation
        shell: pwsh
        # Issue #74 (v11.1.0): the CF-Access-gated route module MUST NOT
        # touch console-requiring or destructive surface area. The
        # dispatcher already partitions URLs by prefix, but the runspace
        # pool dot-sources every lib + route into every worker, so any
        # function is technically reachable. This guard is the third
        # safety net (after dispatcher and code review): if Remote.ps1
        # mentions any of these names in EXECUTABLE code (comments are
        # intentionally allowed to document the rule), the build fails so
        # the PR can't land.
        run: |
          $path = 'app/server/routes/Remote.ps1'
          if (-not (Test-Path -LiteralPath $path)) {
              Write-Host "::warning::$path not present; skipping guard."
              exit 0
          }
          $tokens = $null; $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path).Path, [ref]$tokens, [ref]$parseErrors) | Out-Null
          if ($parseErrors -and $parseErrors.Count -gt 0) {
              $parseErrors | ForEach-Object {
                  Write-Host "::error file=$path,line=$($_.Extent.StartLineNumber)::$($_.Message)"
              }
              exit 1
          }
          $banned = @(
              'Setup','ConsoleHost','Database','Browse-','EditDuneIni','Edit-DuneIni',
              'Invoke-DuneCommand','Get-DuneCommandByName','Start-DuneTerminal',
              'Invoke-DuneSshShell','DuneAdmin'
          )
          # Walk every token that is NOT a comment and check its text.
          $bad = @()
          foreach ($tok in $tokens) {
              if ($tok.Kind -eq 'Comment') { continue }
              foreach ($pat in $banned) {
                  if ($tok.Text -match [regex]::Escape($pat)) {
                      $bad += [pscustomobject]@{
                          line = $tok.Extent.StartLineNumber
                          text = $tok.Text
                          pat  = $pat
                      }
                      break
                  }
              }
          }
          if ($bad) {
              foreach ($h in $bad) {
                  Write-Host "::error file=$path,line=$($h.line)::Remote.ps1 must not reference '$($h.pat)' in code (found: '$($h.text)')."
              }
              exit 1
          }
          Write-Host "Remote.ps1 isolation guard OK"
